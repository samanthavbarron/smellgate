name: E2E

# Manual-only for now (#216). Wire cron / PR gating once the suite is
# confirmed green against prod and flake-free. Secrets live on the
# `production` environment so they are NOT exposed to PRs from forks.
on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target URL (default: https://smellgate.app)"
        required: false
        default: "https://smellgate.app"
      grep:
        description: "Optional Playwright --grep filter"
        required: false
        default: ""

concurrency:
  group: e2e
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright against ${{ inputs.target_url }}
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    env:
      E2E_MODE: live
      SMELLGATE_E2E_URL: ${{ inputs.target_url }}
      # These secrets must be configured on the `production` environment.
      # See tests/e2e/README.md "CI" section.
      SMELLGATE_BSKY_HANDLE: ${{ secrets.E2E_BSKY_HANDLE }}
      SMELLGATE_BSKY_PASSWORD: ${{ secrets.E2E_BSKY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E
        run: |
          if [ -n "${{ inputs.grep }}" ]; then
            pnpm test:e2e --grep "${{ inputs.grep }}"
          else
            pnpm test:e2e
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload custom artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: tests/e2e/artifacts
          if-no-files-found: ignore
